version: '3.8'

services:
  auth-db:
    image: postgres:15-alpine
    container_name: bookstore-auth-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./auth-service
    container_name: bookstore-auth-service
    depends_on:
      - auth-db
    env_file:
      - .env
    volumes:
      - ./auth-service:/app

  book-db:
    image: postgres:15-alpine
    container_name: bookstore-book-db
    ports:
      - "5433:5432"
    volumes:
      - book-db-data:/var/lib/postgresql/data
    env_file:
      - .env.book

  book-service:
    build:
      context: ./book-service
    container_name: bookstore-book-service
    depends_on:
      - book-db
    env_file:
      - .env.book
    volumes:
      - ./book-service:/app

  api-gateway:
    image: nginx:alpine
    container_name: bookstore-nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - book-service

volumes:
  auth-db-data:
  book-db-data: